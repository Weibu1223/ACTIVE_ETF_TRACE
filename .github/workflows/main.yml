name: Daily ETF data update

on:
  schedule:
    # 每天台灣時間 09:00 -> 01:00 UTC
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers (with deps)
        run: |
          python -m playwright install --with-deps chromium

      - name: Run etf monitor
        env:
          TZ: Asia/Taipei
        run: |
          python etf_monitor.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 暫存變更
          git add .
          
          # 檢查是否有變動
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(data): update ETF data $(date +'%Y-%m-%d')"
            
            # 關鍵步驟：先拉取遠端變更並使用 rebase 避免 merge commit
            # 這樣可以解決「tip of your current branch is behind」的問題
            git pull --rebase origin main
            
            git push origin main
          fi
