name: Daily ETF data update

on:
  schedule:
    # 每天台灣時間 09:00 -> 01:00 UTC
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers (with deps)
        run: |
          python -m playwright install --with-deps chromium

      - name: Run etf monitor
        env:
          TZ: Asia/Taipei
        run: |
          python etf_monitor.py

      - name: Create Pull Request for data updates
        id: create_pr
        uses: peter-evans/create-pull-request@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(data): update ETF data (${{ github.run_id }})"
          title: "chore(data): update ETF data"
          body: "Automated data update by GitHub Actions"
          branch: "data-update-${{ github.run_id }}"
          base: main
          paths: |
            data/**

      - name: Merge the PR (if created)
        if: steps.create_pr.outputs.pull-request-number != ''
        uses: peter-evans/merge-pull-request@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ steps.create_pr.outputs.pull-request-number }}
          merge-method: squash
